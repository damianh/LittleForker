name: ci

on:
  push:
    branches:
      - main
      - '**'
  pull_request:
  workflow_dispatch:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@v4
      with:
        fetch-depth: 0
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '10.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --no-restore --configuration Release
    
    - name: Run tests
      timeout-minutes: 5
      run: dotnet run --project src/LittleForker.Tests/LittleForker.Tests.csproj --no-build --configuration Release
    
    - name: Build NuGet package
      run: dotnet pack src/LittleForker/LittleForker.csproj --no-build --configuration Release --output ./packages
    
    - name: Upload NuGet package
      uses: actions/upload-artifact@v4
      with:
        name: nuget-packages
        path: ./packages/*.nupkg
